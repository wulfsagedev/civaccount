name: Monthly Data Freshness Check

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 8am UTC
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - run: npm ci

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ─── Step 0: Auto-sync GOV.UK Band D live table ───
      # The Band_D ODS at the well-known live-tables URL is the canonical source
      # of truth for council tax. We fetch it monthly and re-sync any drift.
      - name: Sync Band D from GOV.UK live tables
        id: sync_band_d
        continue-on-error: true
        run: |
          set -e
          SRC_URL="https://assets.publishing.service.gov.uk/media/69c280bb13101e9908704b78/Band_D_2026-27.ods"
          DEST="src/data/councils/pdfs/gov-uk-bulk-data/Band_D_2026-27.ods"
          echo "Downloading latest Band D ODS..."
          curl -sSfL -o "$DEST.new" "$SRC_URL" || { echo "Download failed — keeping existing file"; exit 0; }
          # Compare hashes to skip needless syncs
          OLD_HASH=$(shasum -a 256 "$DEST" 2>/dev/null | awk '{print $1}' || echo "")
          NEW_HASH=$(shasum -a 256 "$DEST.new" | awk '{print $1}')
          if [ "$OLD_HASH" = "$NEW_HASH" ]; then
            rm "$DEST.new"
            echo "Band D ODS unchanged ($NEW_HASH)"
            echo "synced=false" >> $GITHUB_OUTPUT
          else
            mv "$DEST.new" "$DEST"
            echo "Band D ODS updated (was $OLD_HASH, now $NEW_HASH)"
            echo "synced=true" >> $GITHUB_OUTPUT
            # Re-parse + re-sync TS files
            npm run sync:band-d || echo "sync script failed — will be flagged in validation"
          fi

      # ─── Step 1: Check for stale data sources ───
      - name: Check source staleness
        id: staleness
        run: |
          node -e "
            const manifest = require('./scripts/validate/source-manifest.json');
            const now = new Date();
            const stale = [];
            for (const s of manifest.sources) {
              if (!s.last_downloaded) continue;
              const downloaded = new Date(s.last_downloaded);
              const monthsSince = (now - downloaded) / (1000 * 60 * 60 * 24 * 30);
              const maxMonths = s.update_frequency === 'quarterly' ? 4 : s.update_frequency === 'continuous' ? 3 : 14;
              if (monthsSince > maxMonths) {
                stale.push({ id: s.id, last: s.last_downloaded, months: Math.round(monthsSince), freq: s.update_frequency, page: s.gov_uk_page });
              }
            }
            if (stale.length > 0) {
              require('fs').writeFileSync('stale-sources.json', JSON.stringify(stale, null, 2));
              console.log('Found ' + stale.length + ' stale source(s)');
              process.exit(1);
            } else {
              console.log('All sources within expected freshness window');
            }
          "
        continue-on-error: true

      # ─── Step 2: Verify local file checksums ───
      - name: Verify checksums
        id: checksums
        run: node scripts/validate/compare-checksums.mjs 2>&1 | tee freshness-output.txt
        continue-on-error: true

      # ─── Step 3: Run full validation pipeline ───
      - name: Validate council data
        id: validate
        run: npm run validate 2>&1 | tee validation-output.txt
        continue-on-error: true

      # ─── Step 4: Regenerate coverage stats ───
      - name: Regenerate coverage stats
        run: npm run generate:coverage

      # ─── Step 5: Check if coverage stats changed ───
      - name: Check for changes
        id: changes
        run: |
          git diff --name-only > changed-files.txt
          if [ -s changed-files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            cat changed-files.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No files changed"
          fi

      # ─── Step 6: Auto-PR if coverage stats updated ───
      - name: Create PR with updated stats
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="automated/data-freshness-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/coverage-stats.ts \
                  src/data/councils/pdfs/gov-uk-bulk-data/Band_D_2026-27.ods \
                  src/data/councils/pdfs/gov-uk-bulk-data/parsed-area-band-d.csv \
                  src/data/councils/county-councils.ts \
                  src/data/councils/metropolitan.ts \
                  src/data/councils/london-boroughs.ts \
                  src/data/councils/unitary.ts \
                  src/data/councils/districts.ts 2>/dev/null || true
          git commit -m "chore: regenerate coverage stats (automated monthly)

          Updated by data-freshness.yml workflow.
          Validation: ${{ steps.validate.outcome }}
          Checksums: ${{ steps.checksums.outcome }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: monthly data freshness update — $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## Automated Monthly Data Freshness

          This PR was created automatically by the monthly data-freshness workflow.

          ### What changed
          - Regenerated `src/data/coverage-stats.ts` from latest validation report
          - Band D auto-sync: ${{ steps.sync_band_d.outputs.synced == 'true' && 'Updated from GOV.UK live tables' || 'Already current' }}

          ### Validation status
          - Checksums: ${{ steps.checksums.outcome }}
          - Validation: ${{ steps.validate.outcome }}
          - Staleness: ${{ steps.staleness.outcome }}
          - Band D sync: ${{ steps.sync_band_d.outcome }}

          ### Review checklist
          - [ ] Coverage numbers look reasonable
          - [ ] No unexpected regressions

          ---
          *Automated by [data-freshness.yml](.github/workflows/data-freshness.yml)*
          EOF
          )" \
            --label "data-quality,automated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Step 7: Create issue if problems detected ───
      - name: Create issue if stale or broken
        if: steps.staleness.outcome == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');

            let staleList = '';
            if (fs.existsSync('stale-sources.json')) {
              const stale = JSON.parse(fs.readFileSync('stale-sources.json', 'utf-8'));
              staleList = stale.map(s =>
                `- **${s.id}** — last downloaded ${s.last} (${s.months} months ago, expected: ${s.freq})\n  ${s.page || 'No URL'}`
              ).join('\n');
            }

            const validateOutput = fs.existsSync('validation-output.txt')
              ? fs.readFileSync('validation-output.txt', 'utf-8').slice(-1500)
              : 'No output';

            const body = `## Monthly Data Freshness Alert

            ### Stale Sources

            The following datasets are overdue for a refresh:

            ${staleList}

            ### What to do

            1. Visit each GOV.UK page linked above
            2. Check if newer data has been published
            3. If so, download the updated file
            4. Run the relevant parse script (see \`scripts/\`)
            5. Run \`npm run checksum:update\` to update the manifest
            6. Run \`npm run validate\` to verify
            7. Commit and push

            ### Current validation
            \`\`\`
            ${validateOutput}
            \`\`\`

            ---
            *Automated by [data-freshness.yml](.github/workflows/data-freshness.yml)*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Automated] Data sources need refresh — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['data-quality', 'automated']
            });
