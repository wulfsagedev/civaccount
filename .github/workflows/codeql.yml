name: CodeQL

# GitHub's free static-analysis scanner.  Catches common JS/TS bugs
# (injection sinks, prototype pollution, unsafe HTML, open redirects, etc.)
# and surfaces them in the repo's Security tab.
#
# This workflow is ready to run, but GitHub also requires a one-time
# enable-ment in the repo UI:
#   Settings → Code security → Code scanning → CodeQL analysis → Set up.
# Once enabled, GitHub runs this file on every push/PR + weekly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep on Monday 04:00 UTC, catches advisories that drop
    # between pushes.
    - cron: '0 4 * * 1'

permissions:
  contents: read
  # CodeQL needs to upload SARIF results to the Security tab.
  security-events: write
  # Only needed if the repo is private with Advanced Security — harmless here.
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          # security-extended includes queries that catch high-severity bugs
          # without the noise of security-and-quality.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:${{ matrix.language }}'
