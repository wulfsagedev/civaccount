name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to the lowest GITHUB_TOKEN permissions possible.  Individual jobs
# can opt in to more if they actually need it — nothing in this workflow does.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to a full commit SHA (not a tag) so an attacker who
      # takes over the actions org cannot retroactively change what v4 means.
      # Comments after the pin show the human-readable tag for reviewers.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Validate council data
        run: npm run validate

      - name: Regenerate coverage stats
        run: npm run generate:coverage

      - name: Check for private data
        id: data
        run: |
          if [ -f src/data/councils/index.ts ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Build step — private council data not present on this runner. Vercel deploys still build against the real dataset."
          fi

      - name: Build
        if: steps.data.outputs.present == 'true'
        run: npm run build
        env:
          # These placeholders are intentionally non-functional — the build
          # only needs them to exist so `process.env.X!` assertions don't
          # blow up at module-init time.  Real values are injected at runtime
          # from Vercel's env-var store, never from CI.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    # Duplicates the pre-commit hook's checks at the repo level so no commit
    # that sneaks past a local hook survives a PR.  Runs on every push and PR.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so the scan sees every commit in this PR,
          # not just the tip.  `fetch-depth: 0` is only required on PRs but
          # is cheap enough to always request.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          # GITHUB_TOKEN is required by gitleaks-action v2+ to scan PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Gitleaks is free for public repos; no licence key required.
          GITLEAKS_NOTIFY_USER_LIST: ''
        with:
          # Run in redact mode so any finding is shown without the raw
          # value in the action log.
          args: detect --redact --no-git -v --config=.github/gitleaks.toml

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Information-only — an advisory landing on main does not fail the build
    # immediately.  A nightly run will fail if an advisory is outstanding for
    # > 14 days (see separate workflow).
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit (production dependencies only)
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares the PR diff against main and
    # fails if any newly-introduced dependency has a known High/Critical
    # advisory, or an incompatible licence.  Stops vulnerable deps landing
    # on main at the PR gate instead of being caught by npm-audit after
    # the fact.
    #
    # Requires Dependency Graph to be enabled on the repo:
    #   Settings → Code security → Dependency graph
    # When disabled the action fails fast with "not supported on this
    # repository", so we keep the job advisory (`continue-on-error`) until
    # the admin toggle is flipped.
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@4081bf99e2866ebe428fc0477b69eb4fcda7220a # v4.4.0
        with:
          fail-on-severity: high
          # Block dependencies released in the last 48h — "day-zero" typosquats
          # and hijacked packages usually hit registries fresh, so holding a
          # short maturity window is a cheap supply-chain guard.
          warn-on-openssf-scorecard-level: 5
